server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # JS/CSS use versioned ?v=NN cache-busting query strings, but browsers
    # don't always honor them when the resource is already cached for a long
    # time. `must-revalidate` forces a fresh ETag check on every load, so a
    # JS update is picked up within one hard-refresh.
    # Static assets (fonts/images) keep the 1-day cache since they don't change.
    location ~* \.(js|css|html)$ {
        expires off;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|json)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
