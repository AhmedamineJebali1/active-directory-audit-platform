<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Activer mon compte — AD Audit AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=12" />
  <link rel="stylesheet" href="/css/redesign.css?v=12" />
  <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
  <script src="/js/api.js?v=14"></script>
  <script>
  function pwSetterApp(opts) {
    return {
      kind: opts.kind,                  // 'invite' | 'reset'
      token: new URLSearchParams(location.search).get('token') || '',
      pw: '', pw2: '', loading: false, error: null, success: false,
      score: 0,
      onPwInput() {
        const p = this.pw;
        let s = 0;
        if (p.length >= 12) s++;
        if (/[a-z]/.test(p) && /[A-Z]/.test(p)) s++;
        if (/\d/.test(p)) s++;
        if (/[^A-Za-z0-9]/.test(p)) s++;
        this.score = s;
      },
      get scoreLabel() {
        return ['Trop faible', 'Faible', 'Correct', 'Fort', 'Très fort'][this.score] || '';
      },
      get scoreColor() {
        return ['#EF4444','#F97316','#EAB308','#22C55E','#22C55E'][this.score] || '#666';
      },
      async submit() {
        this.error = null;
        if (!this.token) { this.error = "Lien invalide — token manquant."; return; }
        if (this.pw !== this.pw2) { this.error = "Les mots de passe ne correspondent pas."; return; }
        if (this.pw.length < 12) { this.error = "Minimum 12 caractères."; return; }
        this.loading = true;
        try {
          const url = this.kind === 'invite' ? '/api/v1/auth/accept-invite' : '/api/v1/auth/reset-password';
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: this.token, new_password: this.pw }),
          });
          if (!res.ok) {
            let msg = 'Erreur ' + res.status;
            try { const j = await res.json(); if (j.detail) msg = j.detail; } catch (_) {}
            throw new Error(msg);
          }
          const data = await res.json();
          api.setTokens(data.access_token, data.refresh_token);
          this.success = true;
          setTimeout(() => { location.href = '/dashboard.html'; }, 800);
        } catch (e) {
          this.error = e.message;
        } finally {
          this.loading = false;
        }
      },
    };
  }
  </script>
  <style>
    .pw-page { min-height:100vh; display:grid; place-items:center; padding:32px 16px; }
    .pw-card { width:100%; max-width:440px; padding:36px 32px;
               background: var(--color-bg-glass); border: 1px solid var(--color-border-strong);
               border-radius: var(--radius-xl); backdrop-filter: blur(18px); }
    .pw-strength {
      height: 6px; border-radius: 3px; overflow:hidden;
      background: rgba(255,255,255,0.08); margin-top:6px;
    }
    .pw-strength__fill { height: 100%; transition: width 200ms, background 200ms; }
  </style>
</head>
<body class="has-mesh-bg">
  <div class="pw-page" x-data="pwSetterApp({kind:'invite'})">
    <div class="pw-card">
      <div class="brand-glow" style="margin-bottom:18px;">
        <span class="brand-glow__logo">AD</span>
        <span>AD Audit AI</span>
      </div>
      <h1 style="font-size:22px;font-weight:700;margin:0 0 6px;">Activer mon compte</h1>
      <p style="font-size:13px;color:var(--color-text-muted);margin:0 0 22px;">
        Choisissez le mot de passe de votre compte.
      </p>

      <template x-if="success">
        <div style="padding:14px;border-radius:8px;background:rgba(34,197,94,0.10);border:1px solid rgba(34,197,94,0.4);color:#86efac;font-size:13px;">
          ✓ Compte activé. Redirection…
        </div>
      </template>

      <form x-show="!success" @submit.prevent="submit()" style="display:flex;flex-direction:column;gap:16px;">
        <div class="field-2026">
          <label>Nouveau mot de passe</label>
          <input type="password" required minlength="12" x-model="pw" @input="onPwInput()" autocomplete="new-password" />
          <div class="pw-strength">
            <div class="pw-strength__fill" :style="`width:${score*25}%; background:${scoreColor}`"></div>
          </div>
          <div style="font-size:11px;color:var(--color-text-muted);margin-top:4px;display:flex;justify-content:space-between;">
            <span>≥ 12 caractères, mélanger types</span>
            <span x-text="scoreLabel" :style="`color:${scoreColor}`"></span>
          </div>
        </div>
        <div class="field-2026">
          <label>Confirmer le mot de passe</label>
          <input type="password" required minlength="12" x-model="pw2" autocomplete="new-password" />
        </div>
        <div x-show="error" class="login-error" x-text="error"></div>
        <button type="submit" class="btn-2026 btn-2026--primary" :disabled="loading">
          <span x-show="!loading">Activer le compte</span>
          <span x-show="loading">Validation…</span>
        </button>
      </form>
    </div>
  </div>
</body>
</html>
