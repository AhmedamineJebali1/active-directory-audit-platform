<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/assets/img/logo.png" />
  <title>Mot de passe oublié — AD Audit AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=12" />
  <link rel="stylesheet" href="/css/redesign.css?v=12" />
  <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
  <style>
    .fp-page { min-height:100vh; display:grid; place-items:center; padding:32px 16px; }
    .fp-card { width:100%; max-width:420px; padding:36px 32px;
               background: var(--color-bg-glass); border: 1px solid var(--color-border-strong);
               border-radius: var(--radius-xl); backdrop-filter: blur(18px); }
  </style>
</head>
<body class="has-mesh-bg">
  <div class="fp-page" x-data="{
    email: '', loading: false, sent: false, error: null,
    async submit() {
      this.error = null; this.loading = true;
      try {
        const res = await fetch('/api/v1/auth/forgot-password', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({email: this.email}),
        });
        if (!res.ok) throw new Error('Erreur ' + res.status);
        this.sent = true;
      } catch (e) { this.error = e.message; }
      finally { this.loading = false; }
    }
  }">
    <div class="fp-card">
      <div class="brand-glow" style="margin-bottom:18px;">
        <span class="brand-glow__logo">AD</span>
        <span>AD Audit AI</span>
      </div>
      <h1 style="font-size:22px;font-weight:700;margin:0 0 6px;">Mot de passe oublié</h1>
      <p style="font-size:13px;color:var(--color-text-muted);margin:0 0 22px;">
        Si l'adresse correspond à un compte actif, vous recevrez un email avec un lien de réinitialisation (valide 1 heure).
      </p>

      <template x-if="sent">
        <div style="padding:14px;border-radius:8px;background:rgba(134,188,37,0.08);border:1px solid rgba(134,188,37,0.3);color:#a3e635;font-size:13px;">
          ✓ Si un compte existe avec cet email, un lien a été envoyé. Vérifiez votre boîte de réception.
        </div>
      </template>

      <form x-show="!sent" @submit.prevent="submit()" style="display:flex;flex-direction:column;gap:16px;">
        <div class="field-2026">
          <label>Adresse e-mail</label>
          <input type="email" required x-model="email" autocomplete="username" />
        </div>
        <div x-show="error" class="login-error" x-text="error"></div>
        <button type="submit" class="btn-2026 btn-2026--primary" :disabled="loading">
          <span x-show="!loading">Envoyer le lien</span>
          <span x-show="loading">Envoi…</span>
        </button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:12px;">
        <a href="/index.html" style="color:var(--color-text-muted);text-decoration:underline;">Retour à la connexion</a>
      </p>
    </div>
  </div>
</body>
</html>
