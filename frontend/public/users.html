<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/assets/img/logo.png" />
  <title>Utilisateurs — AD Audit AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tokens.css?v=12" />
  <link rel="stylesheet" href="/css/redesign.css?v=15" />
  <link rel="stylesheet" href="/css/base.css?v=12" />
  <link rel="stylesheet" href="/css/components.css?v=12" />
  <link rel="stylesheet" href="/css/dashboard.css?v=12" />
  <link rel="stylesheet" href="/css/toast.css?v=12" />
  <script src="/js/api.js?v=14"></script>
  <script src="/js/auth.js?v=15"></script>
  <script src="/js/toast.js?v=12"></script>
  <script src="/js/status_chips.js?v=12"></script>
  <script src="/js/users.js?v=13"></script>
  <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
  <style>
    .user-row { transition: background 120ms; }
    .user-row:hover { background: rgba(255,255,255,0.02); }
    .user-row.is-disabled { opacity: 0.5; }
    .role-pill {
      display: inline-block;
      padding: 3px 9px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
      border: 1px solid var(--color-border-strong);
    }
    .role-pill--admin   { color: var(--risk-critique); border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.08); }
    .role-pill--manager { color: var(--color-accent);  border-color: rgba(134,188,37,0.4); background: rgba(134,188,37,0.08); }
    .role-pill--auditor { color: #4A9EFF;              border-color: rgba(74,158,255,0.4); background: rgba(74,158,255,0.08); }
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot--on { background: var(--risk-faible); }
    .status-dot--off { background: var(--color-text-dim); }
    .invite-modal {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(10, 14, 26, 0.7);
      backdrop-filter: blur(8px);
      display: grid; place-items: center; padding: 20px;
      animation: fade-in 200ms;
    }
    .invite-modal__inner {
      width: 100%; max-width: 460px;
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      padding: 28px;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="has-mesh-bg">
  <div class="app-shell" id="app-shell">
    <div id="nav-slot"></div>

    <div>
      <header class="topbar">
        <div>
          <div class="topbar__breadcrumb"><a href="/dashboard.html" style="color:inherit;text-decoration:none;">Tableau de bord</a> / Utilisateurs</div>
          <div class="topbar__title">Gestion des utilisateurs</div>
        </div>
        <div class="topbar__spacer"></div>
      </header>

      <main class="main-content" x-data="usersApp()" x-init="init()">

        <template x-if="!isAdmin">
          <div class="empty-state" style="text-align:center;padding:60px;">
            <div style="font-size:48px;margin-bottom:16px;">🔒</div>
            <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">Accès réservé</h2>
            <p style="color:var(--color-text-muted);font-size:14px;">
              Seuls les administrateurs peuvent gérer les comptes utilisateurs.
            </p>
          </div>
        </template>

        <template x-if="isAdmin">
          <div>

            <!-- ── Action row ─────────────────────────────────── -->
            <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;">
              <div style="display:flex;align-items:center;gap:10px;flex:1;">
                <input class="form-control" type="search" placeholder="Rechercher (email, nom)"
                       x-model.debounce.350ms="search" @input="reload()"
                       style="max-width:320px;" />
                <label style="font-size:13px;color:var(--color-text-muted);display:flex;align-items:center;gap:6px;">
                  <input type="checkbox" x-model="includeDisabled" @change="reload()" />
                  Inclure désactivés
                </label>
              </div>
              <button class="btn-2026 btn-2026--primary" @click="openInvite()">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5v11M1.5 7h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                Inviter un utilisateur
              </button>
            </div>

            <!-- ── Stats ────────────────────────────────────── -->
            <div class="stat-grid" style="margin-bottom:24px;">
              <div class="stat-card">
                <div class="stat-card__head"><span class="stat-card__label">Total comptes</span></div>
                <div class="stat-card__value" x-text="users.length"></div>
              </div>
              <div class="stat-card">
                <div class="stat-card__head"><span class="stat-card__label">Admins</span></div>
                <div class="stat-card__value" style="color:var(--risk-critique);" x-text="byRole('admin')"></div>
              </div>
              <div class="stat-card">
                <div class="stat-card__head"><span class="stat-card__label">Managers</span></div>
                <div class="stat-card__value" style="color:var(--color-accent);" x-text="byRole('manager')"></div>
              </div>
              <div class="stat-card">
                <div class="stat-card__head"><span class="stat-card__label">Auditeurs</span></div>
                <div class="stat-card__value" style="color:#4A9EFF;" x-text="byRole('auditor')"></div>
              </div>
            </div>

            <!-- ── User table ─────────────────────────────────── -->
            <div class="card">
              <div class="card-header">
                <h3 style="font-size:15px;font-weight:600;">Comptes</h3>
                <span style="font-size:12px;color:var(--color-text-muted);" x-text="total + ' au total'"></span>
              </div>
              <div class="card-body" style="padding:0;">
                <template x-if="loading">
                  <div style="padding:40px;text-align:center;color:var(--color-text-muted);">
                    <span class="spinner"></span>
                  </div>
                </template>
                <template x-if="!loading && users.length === 0">
                  <div style="padding:40px;text-align:center;color:var(--color-text-muted);font-size:13px;">
                    Aucun utilisateur trouvé.
                  </div>
                </template>
                <table class="data-table" x-show="!loading && users.length > 0">
                  <thead>
                    <tr>
                      <th>Utilisateur</th>
                      <th>Rôle</th>
                      <th>État</th>
                      <th>Créé le</th>
                      <th>Dernière connexion</th>
                      <th style="text-align:right;">Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="u in users" :key="u.id">
                      <tr class="user-row" :class="!u.is_active ? 'is-disabled' : ''">
                        <td>
                          <div style="font-weight:600;color:var(--color-text);" x-text="u.full_name"></div>
                          <div style="font-size:11px;font-family:var(--font-mono);color:var(--color-text-muted);" x-text="u.email"></div>
                        </td>
                        <td>
                          <select class="form-control"
                                  :value="u.role" @change="changeRole(u, $event.target.value)"
                                  style="font-size:11px;padding:4px 8px;font-family:var(--font-mono);max-width:140px;"
                                  :disabled="u.id === me.id">
                            <option value="admin">admin</option>
                            <option value="manager">manager</option>
                            <option value="auditor">auditor</option>
                          </select>
                        </td>
                        <td>
                          <span class="status-dot" :class="u.is_active ? 'status-dot--on' : 'status-dot--off'"></span>
                          <span x-text="u.is_active ? 'Actif' : 'Désactivé'" style="font-size:12px;"></span>
                        </td>
                        <td style="font-size:11px;color:var(--color-text-muted);font-family:var(--font-mono);" x-text="formatDate(u.created_at)"></td>
                        <td style="font-size:11px;color:var(--color-text-muted);font-family:var(--font-mono);" x-text="formatDate(u.last_login_at) || 'jamais'"></td>
                        <td style="text-align:right;white-space:nowrap;display:flex;gap:4px;justify-content:flex-end;align-items:center;">
                          <button class="btn btn-ghost btn-sm" @click="forceLogout(u)" :disabled="u.id === me.id"
                                  title="Invalider toutes les sessions actives" style="font-size:11px;">
                            Déconnecter
                          </button>
                          <button x-show="u.is_active" class="btn btn-ghost btn-sm"
                                  @click="disable(u)" :disabled="u.id === me.id"
                                  style="color:var(--risk-eleve);font-size:11px;">
                            Désactiver
                          </button>
                          <button x-show="!u.is_active" class="btn btn-ghost btn-sm"
                                  @click="enable(u)" style="color:var(--color-accent);font-size:11px;">
                            Réactiver
                          </button>
                          <!-- Delete: not shown for admins or self -->
                          <button x-show="u.role !== 'admin' && u.id !== me.id"
                                  class="btn btn-ghost btn-sm" @click="openDelete(u)"
                                  title="Supprimer définitivement ce compte"
                                  style="color:var(--risk-critique);font-size:11px;padding:4px 8px;">
                            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="vertical-align:-1px;">
                              <polyline points="2 3.5 11 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                              <path d="M4.5 3.5V2.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                              <rect x="2.5" y="3.5" width="8" height="7" rx="1" stroke="currentColor" stroke-width="1.3"/>
                              <line x1="5" y1="5.5" x2="5" y2="9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                              <line x1="8" y1="5.5" x2="8" y2="9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                            </svg>
                            Supprimer
                          </button>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </template>

        <!-- ── Invite modal ─────────────────────────────────── -->
        <template x-if="inviteOpen">
          <div class="invite-modal" @click.self="inviteOpen = false">
            <div class="invite-modal__inner" x-data x-trap.noscroll="true">
              <h2 style="font-size:18px;font-weight:700;margin:0 0 6px;">Inviter un utilisateur</h2>
              <p style="font-size:13px;color:var(--color-text-muted);margin:0 0 20px;">
                Un email d'invitation sera envoyé. Le compte est créé immédiatement avec un mot de passe temporaire.
              </p>
              <form @submit.prevent="submitInvite()" style="display:flex;flex-direction:column;gap:14px;">
                <div class="field-2026">
                  <label>Email</label>
                  <input type="email" required x-model="invite.email" placeholder="auditeur@organisation.com" autocomplete="off" />
                </div>
                <div class="field-2026">
                  <label>Nom complet</label>
                  <input type="text" required x-model="invite.full_name" placeholder="Prénom Nom" autocomplete="off" />
                </div>
                <div class="field-2026">
                  <label>Rôle</label>
                  <select x-model="invite.role">
                    <option value="auditor">auditor — peut être assigné à des missions</option>
                    <option value="manager">manager — peut créer/gérer des missions</option>
                    <option value="admin">admin — accès complet et gestion utilisateurs</option>
                  </select>
                </div>
                <div class="field-2026">
                  <label>Mot de passe temporaire</label>
                  <input type="text" required minlength="12" x-model="invite.password"
                         placeholder="≥ 12 caractères, mélanger majuscules, chiffres, symboles" autocomplete="off" />
                  <p style="font-size:11px;color:var(--color-text-muted);margin-top:6px;">
                    L'utilisateur devra le changer à la première connexion.
                  </p>
                </div>
                <div x-show="inviteError" class="login-error" style="margin-top:0;" x-text="inviteError"></div>
                <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:6px;">
                  <button type="button" class="btn-2026" @click="inviteOpen = false">Annuler</button>
                  <button type="submit" class="btn-2026 btn-2026--primary" :disabled="inviting">
                    <span x-show="!inviting">Créer le compte</span>
                    <span x-show="inviting">Création…</span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </template>

        <!-- ── Delete confirmation modal ──────────────────────── -->
        <template x-if="deleteTarget">
          <div class="invite-modal" @click.self="closeDelete()">
            <div class="invite-modal__inner" style="max-width:520px;">
              <!-- Header -->
              <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;">
                <div style="width:40px;height:40px;border-radius:50%;background:rgba(200,16,46,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                  <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="color:var(--risk-critique);">
                    <path d="M9 2L1.5 15.5h15L9 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    <line x1="9" y1="7" x2="9" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="9" cy="13.5" r="0.75" fill="currentColor"/>
                  </svg>
                </div>
                <div>
                  <h2 style="font-size:17px;font-weight:700;margin:0 0 4px;">Supprimer ce compte ?</h2>
                  <p style="font-size:13px;color:var(--color-text-muted);margin:0;">
                    Cette action est <strong style="color:var(--risk-critique);">irréversible</strong>. Le compte et ses accès seront définitivement supprimés.
                  </p>
                </div>
              </div>

              <!-- User identity -->
              <div style="background:rgba(255,255,255,0.04);border:1px solid var(--color-border);border-radius:8px;padding:14px 16px;margin-bottom:16px;">
                <div style="font-weight:600;font-size:14px;" x-text="deleteTarget.full_name"></div>
                <div style="font-size:12px;font-family:var(--font-mono);color:var(--color-text-muted);margin-top:2px;" x-text="deleteTarget.email"></div>
                <div style="margin-top:8px;">
                  <span :class="'role-pill role-pill--' + deleteTarget.role" x-text="deleteTarget.role"></span>
                </div>
              </div>

              <!-- Impact summary -->
              <div style="margin-bottom:18px;">
                <p style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-stone);margin-bottom:8px;">Impact de la suppression</p>
                <template x-if="deleteImpactLoading">
                  <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--color-stone);">
                    <span class="spinner" style="width:14px;height:14px;border-width:2px;"></span>
                    Analyse en cours…
                  </div>
                </template>
                <template x-if="!deleteImpactLoading && deleteImpact">
                  <div style="display:flex;flex-direction:column;gap:6px;">
                    <div style="display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:6px;border:1px solid var(--color-border);">
                      <span style="color:var(--color-text-muted);">Missions dont il est membre</span>
                      <strong :style="deleteImpact.missions_member > 0 ? 'color:var(--risk-eleve)' : 'color:var(--color-stone)'" x-text="deleteImpact.missions_member"></strong>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:6px;border:1px solid var(--color-border);">
                      <span style="color:var(--color-text-muted);">Missions où il est lead</span>
                      <strong :style="deleteImpact.missions_lead > 0 ? 'color:var(--risk-critique)' : 'color:var(--color-stone)'" x-text="deleteImpact.missions_lead"></strong>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:6px;border:1px solid var(--color-border);">
                      <span style="color:var(--color-text-muted);">Missions qu'il a créées</span>
                      <strong :style="deleteImpact.missions_created > 0 ? 'color:var(--risk-eleve)' : 'color:var(--color-stone)'" x-text="deleteImpact.missions_created"></strong>
                    </div>
                    <template x-if="deleteImpact.missions_lead > 0">
                      <p style="font-size:12px;color:var(--risk-eleve);margin-top:4px;padding:0 4px;">
                        ⚠ Les missions sans lead après suppression resteront accessibles aux membres existants. Pensez à nommer un nouveau lead avant de supprimer.
                      </p>
                    </template>
                    <template x-if="deleteImpact.missions_created > 0">
                      <p style="font-size:12px;color:var(--color-stone);margin-top:2px;padding:0 4px;">
                        Les missions créées par cet utilisateur seront transférées à votre compte.
                      </p>
                    </template>
                  </div>
                </template>
              </div>

              <!-- Email confirmation -->
              <div style="margin-bottom:16px;">
                <label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px;">
                  Saisissez l'adresse email <strong x-text="deleteTarget.email"></strong> pour confirmer :
                </label>
                <input type="email" class="form-control"
                       x-model="deleteConfirmEmail"
                       placeholder="Email de confirmation"
                       @keydown.enter.prevent="confirmDelete()"
                       autocomplete="off"
                       style="font-family:var(--font-mono);font-size:13px;" />
              </div>

              <!-- Error -->
              <div x-show="deleteError" class="login-error" style="margin-bottom:12px;" x-text="deleteError"></div>

              <!-- Actions -->
              <div style="display:flex;gap:10px;justify-content:flex-end;">
                <button class="btn-2026" @click="closeDelete()" :disabled="deleting">Annuler</button>
                <button class="btn-2026" @click="confirmDelete()"
                        :disabled="!deleteEmailMatches || deleting"
                        style="background:var(--risk-critique);color:#fff;border-color:var(--risk-critique);"
                        :style="!deleteEmailMatches ? 'opacity:0.4;cursor:not-allowed;' : ''">
                  <span x-show="!deleting">Supprimer définitivement</span>
                  <span x-show="deleting">Suppression…</span>
                </button>
              </div>
            </div>
          </div>
        </template>

      </main>
    </div>
  </div>

  <style>[x-cloak]{display:none!important}</style>
</body>
</html>
